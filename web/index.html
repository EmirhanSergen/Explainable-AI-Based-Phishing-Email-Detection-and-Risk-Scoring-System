<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Model Comparison</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Phishing Model Comparison</h1>
    <p class="subtitle">Main TF-IDF model vs. Hybrid TF-IDF + Embedding model</p>

    <section class="input-section">
      <div class="input-header">
        <div>
          <h2>Email Playground</h2>
          <p id="sampleMeta" class="sample-meta">Loading a saved test email...</p>
        </div>
        <div class="button-row">
          <button id="generateBtn" class="secondary-btn" type="button">Generate Email</button>
          <button id="analyzeBtn" type="button">Analyze Both Models</button>
        </div>
      </div>
      <textarea id="emailText" placeholder="Paste the email content here..."></textarea>
    </section>

    <section id="results" class="results-section hidden">
      <div id="comparisonSummary" class="summary-banner"></div>
      <div class="comparison-grid">
        <article id="mainResult" class="model-result"></article>
        <article id="hybridResult" class="model-result"></article>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
